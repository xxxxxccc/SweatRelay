name: Build (main)

# Every push to main produces fresh CLI binaries + GUI installers, published as
# rolling assets on the `nightly` GitHub pre-release. Useful for early users and
# PR review without waiting for a tagged release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: CLI ${{ matrix.target_os }}-${{ matrix.target_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target_os: darwin
            target_arch: arm64
          - os: windows-latest
            target_os: windows
            target_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sweatrelay/cli run bundle
      - run: pnpm --filter @sweatrelay/cli run build:binary
      - uses: actions/upload-artifact@v4
        with:
          name: sweatrelay-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: packages/cli/dist/sweatrelay-${{ matrix.target_os }}-${{ matrix.target_arch }}*
          if-no-files-found: error

  gui:
    name: GUI ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sweatrelay/gui run package
      - uses: actions/upload-artifact@v4
        with:
          name: sweatrelay-gui-${{ matrix.os }}
          path: |
            packages/gui/release/*.dmg
            packages/gui/release/*.exe
            packages/gui/release/latest*.yml
          if-no-files-found: warn

  publish-nightly:
    name: Publish to nightly pre-release
    needs: [cli, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (latest main)
          body: |
            Rolling pre-release built from the tip of `main` at commit ${{ github.sha }}.
            Replaced on every push to main.
          prerelease: true
          make_latest: false
          files: artifacts/**/*
